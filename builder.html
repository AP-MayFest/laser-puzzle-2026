<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/common.css" />
    <title>レーザーパズル ビルダー</title>
</head>
<body>
<main>
    <header>
        <h1>レーザーパズル ビルダー</h1>
        <div>
            <button id="copy-link" class="button">URLをコピー</button>
            <button id="open-preview" class="button button-primary">プレイ</button>
        </div>
    </header>
    <section id="board-options">
        <h2>盤面</h2>
        <div>
            <label>縦<input id="board-height" type="number" min="2" step="1" value="7"></label>
            <label>横<input id="board-width" type="number" min="2" step="1" value="7"></label>
        </div>
    </section>
    <section id="board-editor">
        <canvas id="canvas-edit" class="puzzle-canvas"></canvas>
    </section>
    <section id="reserve-editor">
        <h2>持ち駒</h2>
        <div class="reserve-count-inputs">
            <label>
                <span>片面ミラー</span>
                <input id="reserve-count-mirror" type="number" min="-1" step="1" value="0">
            </label>
            <label>
                <span>両面ミラー</span>
                <input id="reserve-count-double-sided-mirror" type="number" min="-1" step="1" value="0">
            </label>
            <label>
                <span>DM</span>
                <input id="reserve-count-dichroic-mirror" type="number" min="-1" step="1" value="0">
            </label>
            <label>
                <span>偏光板（P）</span>
                <input id="reserve-count-polarizer-P" type="number" min="-1" step="1" value="0">
            </label>
            <label>
                <span>偏光板（S）</span>
                <input id="reserve-count-polarizer-S" type="number" min="-1" step="1" value="0">
            </label>
            <label>
                <span>偏光板（ﾅﾅﾒ）</span>
                <input id="reserve-count-polarizer-D" type="number" min="-1" step="1" value="0">
            </label>
            <label>
                <span>PBS</span>
                <input id="reserve-count-PBS" type="number" min="-1" step="1" value="0">
            </label>
        </div>
        <p>
            -1は∞扱い
        </p>
    </section>
</main>
<script type="module" src="/src/pages/builder.ts"></script>
</body>
</html>
